name: 同步常用镜像到阿里云 ACR

on:
  workflow_dispatch:  # 手动触发
  schedule:
  - cron: '0 20 * * *'   # 每天 UTC 时间 20:00 运行 = 北京时间次日凌晨 4:00

# 全局环境变量，定义 ACR 地址和命名空间
env:
  ACR_REGISTRY: crpi-h8wdp3y1iogi9wj4.cn-qingdao.personal.cr.aliyuncs.com   # 你的 ACR 公网地址
  ACR_NAMESPACE: ihee_docker_project                                        # 你的命名空间

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 登录到阿里云 ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password-stdin ${{ env.ACR_REGISTRY }}      # 这里用了环境变量，而不是 secrets

      - name: 同步镜像
        run: |
          # 镜像列表（全部使用稳定版/LTS标签）
          IMAGES=(
            "mysql:8.0"
            "nginx:latest"
            "redis:latest"
            "node:lts"
            "python:3-slim"
            "mongo:6"
            "postgres:15"
            "rabbitmq:3-management"
          )

          for img in "${IMAGES[@]}"; do
            echo "正在处理镜像: $img"
            docker pull "$img"
            safe_name=$(echo "$img" | tr '/' '_')
            acr_image="${ACR_REGISTRY}/${ACR_NAMESPACE}/${safe_name}"
            docker tag "$img" "$acr_image"
            docker push "$acr_image"
            echo "✅ 镜像推送完成: $acr_image"
            echo "------------------------------------"
          done
