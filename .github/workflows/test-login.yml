name: Test ACR Login

on:
  workflow_dispatch:

env:
  ACR_REGISTRY: crpi-h8wdp3y1iogi9wj4.cn-qingdao.personal.cr.aliyuncs.com  # 你的地址

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 打印用户名（仅调试，不会泄露）
        run: |
          if [ -n "${{ secrets.ACR_USERNAME }}" ]; then
            echo "用户名已设置 (长度不为空)"
          else
            echo "❌ 用户名未设置或为空"
          fi

      - name: 登录到阿里云 ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password-stdin ${{ env.ACR_REGISTRY }}
